name: .NET Services CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'inspection-service/**'
      - 'reporting-service/**'
      - 'api-gateway/**'
      - '.github/workflows/dotnet-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'inspection-service/**'
      - 'reporting-service/**'
      - 'api-gateway/**'

jobs:
  build-inspection:
    name: Inspection Service
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          SA_PASSWORD: TestPassword123!
          ACCEPT_EULA: Y
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P TestPassword123! -Q 'SELECT 1'"
          --health-interval 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: inspection-service
        run: dotnet restore

      - name: Build
        working-directory: inspection-service
        run: dotnet build --no-restore -c Release

      - name: Test
        working-directory: inspection-service
        env:
          ConnectionStrings__DefaultConnection: "Server=localhost,1433;Database=FPInspectionTest;User Id=sa;Password=TestPassword123!;TrustServerCertificate=True"
          Jwt__Secret: "test-secret-key-used-only-in-ci-pipeline-32chars"
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=results.trx"

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inspection-test-results
          path: inspection-service/**/*.trx

  build-reporting:
    name: Reporting Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: reporting-service
        run: dotnet restore

      - name: Build
        working-directory: reporting-service
        run: dotnet build --no-restore -c Release

  build-gateway:
    name: API Gateway
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        working-directory: api-gateway
        run: dotnet restore

      - name: Build
        working-directory: api-gateway
        run: dotnet build --no-restore -c Release

  docker-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-inspection, build-reporting, build-gateway]
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - name: inspection-service
            image: factorypulse-inspection
          - name: reporting-service
            image: factorypulse-reporting
          - name: api-gateway
            image: factorypulse-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.image }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
