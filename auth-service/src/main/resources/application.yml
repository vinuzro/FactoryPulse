server:
  port: 8080

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=FactoryPulseAuth;encrypt=false
    username: sa
    password: ${DB_PASSWORD:YourStrongPassword123!}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
        format_sql: true

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-at-least-32-chars}
  expiry-ms: ${JWT_EXPIRY_MS:86400000}

logging:
  level:
    com.factorypulse: DEBUG
    org.springframework.security: INFO
